name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Drizzle migrate (CI Postgres)
        run: npm run db:migrate

      - name: Lint
        run: npm run lint

      - name: Lint @chatbot/core (standalone)
        run: npx eslint packages/core

      - name: Unit tests (app + core)
        run: npm run test

      - name: Production build
        run: npm run build
        env:
          MOCK_DATA: "true"
          NEXTAUTH_SECRET: "ci-build-placeholder-secret-min-32-chars-long-xx"
          NEXTAUTH_URL: "http://localhost:3000"
