name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint @chatbot/core
        run: npx eslint packages/core

      - name: Unit tests (app + core)
        run: npm run test

      - name: Production build
        run: npm run build
        env:
          MOCK_DATA: "true"
          NEXTAUTH_SECRET: "ci-build-placeholder-secret-min-32-chars-long-xx"
          NEXTAUTH_URL: "http://localhost:3000"
